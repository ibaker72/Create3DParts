<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <rect width="512" height="512" rx="64" fill="#0a0a0a"/>
  <!-- 3D layered cube mark representing precision manufacturing -->
  <!-- Bottom layer -->
  <path d="M256 380L128 310V200L256 270L384 200V310L256 380Z" fill="#1e1e1e" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Middle layer -->
  <path d="M256 330L128 260V150L256 220L384 150V260L256 330Z" fill="#131313" stroke="#333" stroke-width="2"/>
  <!-- Top layer - the active/primary layer -->
  <path d="M256 280L128 210V132L256 202L384 132V210L256 280Z" fill="#161616" stroke="#f4621f" stroke-width="3"/>
  <!-- Top face highlight -->
  <path d="M256 202L128 132L256 62L384 132L256 202Z" fill="#1a1a1a" stroke="#f4621f" stroke-width="3"/>
  <!-- Orange accent lines on the cube edges -->
  <line x1="256" y1="62" x2="256" y2="202" stroke="#f4621f" stroke-width="2.5" opacity="0.6"/>
</svg>
